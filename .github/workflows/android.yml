name: Android CI

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  verify:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create .env file for Secrets Gradle Plugin
        run: echo "GEMINI_API_KEY=placeholder" > .env

      - name: Build debug APK
        run: ./gradlew assembleDebug

  release:
    if: >-
      github.event_name == 'push' &&
      (
        startsWith(github.ref, 'refs/tags/v') ||
        (
          github.ref == 'refs/heads/main' &&
          !contains(github.event.head_commit.message, '[skip ci]')
        )
      )
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create .env file for Secrets Gradle Plugin
        run: echo "GEMINI_API_KEY=placeholder" > .env

      - name: Bump app version
        if: github.ref == 'refs/heads/main'
        id: version
        run: |
          chmod +x scripts/bump-version.sh
          ./scripts/bump-version.sh | tee /tmp/version-output.txt
          echo "version_code=$(grep '^versionCode=' /tmp/version-output.txt | cut -d= -f2)" >> "$GITHUB_OUTPUT"
          echo "version_name=$(grep '^versionName=' /tmp/version-output.txt | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      - name: Resolve release version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        id: tagged_version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          echo "version_name=$tag" >> "$GITHUB_OUTPUT"
          echo "version_code=${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Validate release signing secrets
        run: |
          test -n "${{ secrets.RELEASE_KEY_BASE64 }}"
          test -n "${{ secrets.RELEASE_STORE_PASSWORD }}"
          test -n "${{ secrets.RELEASE_KEY_PASSWORD }}"
          test -n "${{ secrets.RELEASE_KEY_ALIAS }}"

      - name: Decode keystore file
        run: echo "${{ secrets.RELEASE_KEY_BASE64 }}" | base64 -d > "${{ github.workspace }}/release.jks"

      - name: Build and sign release APK and AAB
        env:
          RELEASE_KEY_FILE: ${{ github.workspace }}/release.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        run: ./gradlew assembleRelease bundleRelease

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed
          path: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('v{0}', steps.version.outputs.version_name) }}
          name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('Zebel v{0}', steps.version.outputs.version_name) }}
          body: |
            ## Zebel Reminder

            - Version: `${{ startsWith(github.ref, 'refs/tags/v') && steps.tagged_version.outputs.version_name || steps.version.outputs.version_name }}`
            - Version code: `${{ startsWith(github.ref, 'refs/tags/v') && steps.tagged_version.outputs.version_code || steps.version.outputs.version_code }}`
            - Commit: `${{ github.sha }}`

            ### Downloads
            - `app-release.apk` for direct install
            - `app-release.aab` for Google Play upload
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit version bump
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add version.properties
          git diff --staged --quiet && exit 0
          git commit -m "chore: bump version to v${{ steps.version.outputs.version_name }} [skip ci]"
          git push
